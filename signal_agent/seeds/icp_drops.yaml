# ICP drops — companies excluded from polling.
#
# Loaded by signal_agent.seeds.load_icp (after icp_companies.yaml). Sets
# is_icp=false for every matching name. The CSV importer intentionally
# does NOT re-enable these on re-import.
#
# Curated on 2026-04-22 from the 369-company target list to remove 150
# lowest-ICP-fit entries. Rationale by category:
#
#   - AI vendors / AI-native startups that compete with or sell TO the
#     same stack Arthur sells to
#   - Large infra / hyperscaler / cloud providers (they BUILD governance,
#     don't buy it)
#   - Pure cybersecurity companies (different budget pool)
#   - Consumer internet / media / entertainment (no regulated AI)
#   - Large retail / consumer goods / food (low AI-gov urgency)
#   - Commodity semiconductor / heavy industrial / energy (not agentic buyers)
#   - Physical logistics and consumer services
#
# Kept (against one or more of these categories): defense/aerospace primes
# (Lockheed, Raytheon, Northrop, L3Harris, Honeywell, GE Aerospace, Boeing),
# finserv banks, airlines, pharma with AI exposure (Bayer), autos with
# safety-critical AI (Ford, GM, Waymo), regulated automation (Rockwell,
# Motorola Solutions).
#
# To re-enable a dropped company:
#   1. Remove its name from this file.
#   2. UPDATE companies SET is_icp=true WHERE name='<Name>'; (one-time)
#   3. Next CSV re-import won't undo either change.

