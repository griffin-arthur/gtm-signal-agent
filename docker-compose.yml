services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: signal
      POSTGRES_PASSWORD: signal
      POSTGRES_DB: signal_agent
    ports:
      - "5433:5432"  # host 5433 to avoid conflict with any existing local Postgres
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U signal"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  pgdata:
